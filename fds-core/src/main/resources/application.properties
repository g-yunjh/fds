spring.application.name=fds-core

# ---------------------------------------------------------------------
# Binance websocket collector configuration
# ---------------------------------------------------------------------
# The base websocket URL (usually the public spot stream)
binance.websocket.url=wss://stream.binance.com:9443/ws

# Comma-separated list of symbol streams to subscribe to; each entry is
# appended after the base URL.  Example: btcusdt@trade,ethusdt@aggTrade
binance.websocket.symbols=btcusdt@trade

# Kafka topic where raw payloads will be published
binance.kafka.topic=binance-trades
